<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ratikkanäyttö</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
}

.direction {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid #333;
}

.direction:last-child {
    border-bottom: none;
}

.label {
    font-size: 5vw;
    font-weight: 600;
    letter-spacing: 0.2em;
    margin-bottom: 2vh;
}

.minutes {
    font-size: 30vw;
    line-height: 0.9;
    font-weight: 700;
}

.loading {
    font-size: 10vw;
}
</style>
</head>

<body>

<div class="direction">
    <div class="label">LÄNTEEN</div>
    <div id="west" class="minutes loading">--</div>
</div>

<div class="direction">
    <div class="label">ITÄÄN</div>
    <div id="east" class="minutes loading">--</div>
</div>

<script>
const API_URL = "https://api.digitransit.fi/routing/v2/hsl/gtfs/v1";

const WEST_STOP = "H0717";
const EAST_STOP = "H0716";

async function getMinutes(stopId) {
    const query = `
    {
      stop(id: "${stopId}") {
        stoptimesWithoutPatterns(numberOfDepartures: 5) {
          realtime
          realtimeDeparture
          serviceDay
        }
      }
    }`;

    const response = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
    });

    const data = await response.json();

    const departures =
        data.data.stop.stoptimesWithoutPatterns;

    const now = Date.now() / 1000;

    for (const dep of departures) {
        const departureTime =
            dep.serviceDay + dep.realtimeDeparture;

        const diff =
            Math.round((departureTime - now) / 60);

        if (diff >= 0) {
            return diff;
        }
    }

    return "--";
}

async function update() {
    try {
        const west = await getMinutes(WEST_STOP);
        const east = await getMinutes(EAST_STOP);

        document.getElementById("west").textContent = west;
        document.getElementById("east").textContent = east;
    }
    catch (e) {
        console.error(e);
    }
}

update();
setInterval(update, 15000);
</script>

</body>
</html>
