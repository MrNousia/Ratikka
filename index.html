<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ratikkanäyttö</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0074BF;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
}

.direction {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid #333;
}

.direction:last-child {
    border-bottom: none;
}

.label {
    font-size: 11vw;
    font-weight: 600;
    letter-spacing: 0.2em;
    margin-bottom: 2vh;
}

.minutes {
    font-size: 70vw;
    line-height: 1;
    font-weight: 700;
}

.loading {
    font-size: 10vw;
}
</style>
</head>

<body>

<div class="direction">
    <div class="label">LÄNTEEN</div>
    <div id="west" class="minutes loading">--</div>
</div>

<div class="direction">
    <div class="label">ITÄÄN</div>
    <div id="east" class="minutes loading">--</div>
</div>

<script>
const API_URL = "https://api.digitransit.fi/routing/v2/hsl/gtfs/v1";

const STATIONS = {

    karhukallio: {
        west: "HSL:1454401",
        east: "HSL:1454402"
    }

};

const params = new URLSearchParams(window.location.search);

const stationKey =
    (params.get("station") || "karhukallio")
    .toLowerCase();

const station = STATIONS[stationKey];

if (!station) {
    document.body.innerHTML =
        "<h1 style='color:white;text-align:center;margin-top:40vh'>Tuntematon pysäkki</h1>";
    throw new Error("Tuntematon pysäkki");
}

async function getMinutes(stopId) {
    const query = `
    {
      stop(id: "${stopId}") {
        stoptimesWithoutPatterns(numberOfDepartures: 5) {
          realtime
          realtimeDeparture
          serviceDay
        }
      }
    }`;

    const response = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
           "digitransit-subscription-key":
       "3322edcaaffc4e9db898999c455e60a8"
        },
        body: JSON.stringify({ query })
    });

    const data = await response.json();

    const departures =
        data.data.stop.stoptimesWithoutPatterns;

    const now = Date.now() / 1000;

    for (const dep of departures) {
        const departureTime =
            dep.serviceDay + dep.realtimeDeparture;

        const diff =
            Math.round((departureTime - now) / 60);

        if (diff >= 0) {
            return diff;
        }
    }

    return "--";
}

async function update() {
    try {
    const west = await getMinutes(station.west);
    const east = await getMinutes(station.east);

        document.getElementById("west").textContent = west;
        document.getElementById("east").textContent = east;
    }
    catch (e) {
        console.error(e);
    }
}

update();
setInterval(update, 15000);
</script>

</body>
</html>
